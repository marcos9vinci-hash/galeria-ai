name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Trigger Netlify build hook
        run: |
          curl -X POST -d '{}' 'https://api.netlify.com/build_hooks/6a38827aaa88e28c3512a4d9'
